; ============================================================
; .user.ini — PHP runtime config for Azure App Service Linux
; Loaded from the document root by PHP-FPM on every worker
; restart. Changes take effect within 5 minutes (user_ini.cache_ttl).
; ============================================================

; ── OPcache ─────────────────────────────────────────────────
; OPcache is bundled with PHP on Azure App Service but its
; memory limit defaults to 128 MB and revalidation is slow.
; These values are tuned for a small-to-medium app (~50 PHP files).

opcache.enable=1
opcache.enable_cli=0

; Memory for compiled bytecode. 128 MB is safe for this app size.
opcache.memory_consumption=128

; Memory for interned strings (class/function/variable names).
opcache.interned_strings_buffer=16

; Max number of files that can be cached. 1000 covers this app
; many times over. Raising it costs nothing if under the limit.
opcache.max_accelerated_files=4000

; How often (seconds) PHP checks if a source file changed on disk.
; On Azure App Service the filesystem is remote (CIFS/SMB on the
; /home mount) and stat() calls are expensive. Once you deploy via
; ZIP or GitHub Actions, files do not change at runtime, so set to 0
; to disable revalidation entirely. This is the single biggest
; OPcache win on Azure App Service Linux.
opcache.revalidate_freq=0
opcache.validate_timestamps=0

; Enables the file-based second-level cache. Survives worker
; recycling and cold starts. The /tmp mount is local (not SMB),
; so reads/writes are fast.
opcache.file_cache=/tmp/opcache
opcache.file_cache_only=0

; Aggressive internal optimizations (safe for PHP 8.x).
opcache.optimization_level=0x7FFEBFFF

; Preloading is not available on Azure App Service Linux (requires
; the FPM config, which is managed by Microsoft). Leave commented.
; opcache.preload=/var/www/html/preload.php

; ── Session ─────────────────────────────────────────────────
; Your app calls session_start() on every page. The default
; session handler writes files to /tmp which is local on Azure,
; so file-based sessions are fine. These settings reduce overhead.

; Keep sessions on the local /tmp disk (fast, not SMB).
session.save_handler=files
session.save_path=/tmp/php_sessions

; Compact serialization is slightly faster than the default "php".
session.serialize_handler=php_serialize

; Idle sessions expire after 2 hours. Garbage collection runs ~1%
; of requests; low probability so it does not block responses.
session.gc_maxlifetime=7200
session.gc_probability=1
session.gc_divisor=100

; Never expose the session ID in the URL.
session.use_only_cookies=1
session.use_strict_mode=1

; Strict SameSite + Secure flags. Your app is HTTPS on Azure.
session.cookie_httponly=1
session.cookie_secure=1
session.cookie_samesite=Strict

; Lazy session writing: only write the session if it was modified.
; Cuts one disk write per request for read-only pages.
session.lazy_write=1

; ── Output buffering ────────────────────────────────────────
; Azure App Service uses a reverse proxy (ARR/nginx). Full output
; buffering lets PHP finish fast and hand the response off in one
; shot rather than in small chunks.
output_buffering=4096

; ── Error handling (production) ─────────────────────────────
; Never expose errors to the browser on Azure. Log them instead.
display_errors=0
display_startup_errors=0
log_errors=1
error_log=/home/LogFiles/php_errors.log

; ── Limits ──────────────────────────────────────────────────
; These match common Azure App Service B1/B2 SKUs. Increase
; max_execution_time only if you have long-running admin scripts.
max_execution_time=30
max_input_time=30
memory_limit=256M
post_max_size=16M
upload_max_filesize=10M

; ── Realpath cache ──────────────────────────────────────────
; Caches stat() results for include/require paths. Crucial because
; the Azure home mount (SMB) makes every stat() slower than local.
; 512k covers all your require_once paths with room to spare.
realpath_cache_size=512k
realpath_cache_ttl=600
