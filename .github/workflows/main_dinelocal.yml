name: Build and deploy PHP app to Azure Web App - dinelocal

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install composer dependencies (if composer.json exists)
        run: |
          if [ -f composer.json ]; then
            composer install --prefer-dist --no-progress
          else
            echo "No composer.json found, skipping."
          fi

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: php-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: php-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8B8AC3466E544516BE95000AFDEA38D1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B62ED53EE7234C5BB7AC0E2BD0940ED0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9DFEF0D734034B74AE1DAA4F40C4D1F7 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'dinelocal'
          slot-name: 'Production'
          package: .
